<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f3f3f3">
    <title>WebExplorer - 文件管理器</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 移动端遮罩层 -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="app-container">
        <!-- 左侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <svg class="logo-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
                </svg>
                <span>此电脑</span>
                <button class="sidebar-close" id="sidebarClose">&times;</button>
            </div>

            <!-- 快速访问 -->
            <nav class="sidebar-nav">
                <div class="nav-section-title">快速访问</div>
                <ul class="nav-list" id="quickAccessList">
                    <!-- 动态填充 -->
                </ul>

                <div class="nav-section-title">此电脑</div>
                <ul class="nav-list" id="drivesList">
                    <!-- 动态填充驱动器列表 -->
                </ul>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部工具栏 -->
            <header class="toolbar">
                <button class="toolbar-btn menu-btn" id="menuBtn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>

                <div class="toolbar-nav">
                    <button class="toolbar-btn nav-btn" id="btnBack" disabled title="后退">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>
                    <button class="toolbar-btn nav-btn" id="btnForward" disabled title="前进">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                    <button class="toolbar-btn nav-btn" id="btnUp" title="上级目录">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
                    </button>
                    <button class="toolbar-btn nav-btn" id="btnRefresh" title="刷新">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
                    </button>
                </div>

                <!-- 地址栏 -->
                <div class="address-bar" id="addressBar">
                    <div class="breadcrumb" id="breadcrumb">
                        <!-- 动态面包屑导航 -->
                    </div>
                    <input type="text" class="address-input" id="addressInput" placeholder="输入路径..." style="display: none;">
                </div>

                <!-- 搜索框 -->
                <div class="search-box">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" placeholder="搜索..." id="searchInput">
                </div>

                <!-- 视图切换 -->
                <div class="view-toggle">
                    <button class="view-btn active" data-view="grid" title="图标视图">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    </button>
                    <button class="view-btn" data-view="list" title="列表视图">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                    </button>
                </div>
            </header>

            <!-- 工具按钮组 -->
            <div class="action-bar">
                <button class="action-btn" id="btnNewFolder" title="新建文件夹">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
                    新建
                </button>
                <label class="action-btn upload-label" id="uploadLabel" title="上传文件">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    上传
                    <input type="file" id="fileInput" multiple hidden>
                </label>
                <button class="action-btn danger" id="btnDelete" style="display:none;" title="删除选中项">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                    删除
                </button>
            </div>

            <!-- 文件列表区域 -->
            <div class="content-area" id="contentArea">
                <!-- 加载状态 -->
                <div class="loading-state" id="loadingState">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>

                <!-- 文件网格/列表容器 -->
                <div class="files-container grid-view" id="filesContainer">
                    <!-- 动态填充文件列表 -->
                </div>

                <!-- 空状态 -->
                <div class="empty-state" id="emptyState" style="display:none;">
                    <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3">
                        <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
                    </svg>
                    <p>此文件夹为空</p>
                </div>
            </div>

            <!-- 底部状态栏 -->
            <footer class="status-bar">
                <span id="itemCount">0 个项目</span>
                <span id="selectedInfo"></span>
                <span id="currentPathDisplay"></span>
            </footer>
        </main>
    </div>

    <!-- 上传进度浮窗 -->
    <div class="upload-panel" id="uploadPanel" style="display:none;">
        <div class="upload-panel-header">
            <span>上传队列</span>
            <button class="upload-panel-close" id="uploadPanelClose">&times;</button>
        </div>
        <div class="upload-list" id="uploadList">
            <!-- 动态填充上传任务 -->
        </div>
    </div>

    <!-- 右键菜单 -->
    <div class="context-menu" id="contextMenu" style="display:none;">
        <div class="context-item" data-action="download">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            下载
        </div>
        <div class="context-item" data-action="delete">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
            删除
        </div>
    </div>

    <!-- 提示消息 -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/static/js/app.js?v=2"></script>
</body>
</html>
